name: mon_player
description: MonPlayer - Lecteur de musique hors ligne pour iOS
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.12

  # Métadonnées audio / ID3 (bien maintenu, supporte iOS)
  metadata_god: ^0.6.3

  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Système de fichiers
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions (iOS)
  permission_handler: ^11.3.1

  # État (Riverpod)
  flutter_riverpod: ^2.5.1

  # UI / Design
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3+3
  animations: ^2.0.11
  shimmer: ^3.0.0

  # Utilitaires
  uuid: ^4.4.0
  rxdart: ^0.27.7
  collection: ^1.18.0
  equatable: ^2.0.5

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  # Les polices sont chargées via le package google_fonts (Inter)
  # Aucun fichier de police local requis
