name: Build iOS IPA (MonPlayer)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest  # Mac fourni gratuitement par GitHub Actions

    steps:
      # ── 1. Récupérer le code ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Installer Flutter ────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ── 3. Dépendances Flutter ──────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 4. Analyse statique ─────────────────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 5. CocoaPods ────────────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # ── 6. Build iOS (sans signature — pour vérifier que ça compile) ────────
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign

      # ── 7. (Optionnel) Build IPA signé — nécessite les secrets ─────────────
      # Pour activer : ajoutez les secrets GitHub suivants :
      #   - CERTIFICATE_BASE64       : certificat P12 en base64
      #   - CERTIFICATE_PASSWORD     : mot de passe du certificat
      #   - PROVISIONING_PROFILE_BASE64 : profil de provisioning en base64
      #   - KEYCHAIN_PASSWORD        : mot de passe keychain temporaire
      #   - EXPORT_OPTIONS_PLIST_BASE64 : ExportOptions.plist en base64
      #
      # - name: Sign and build IPA
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
      #     ... 
      #   run: |
      #     ... (script de signature)

      # ── 8. Upload artifact ──────────────────────────────────────────────────
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonPlayer-iOS-Build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
        if: success()

  flutter-analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
        continue-on-error: true
